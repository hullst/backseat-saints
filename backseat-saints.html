<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Backseat Saints</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .cover {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 16px;
    object-fit: cover;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    margin-top: 20px;
    color: #f0d060;
  }
  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
  }
  .episode {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }
  .play-btn {
    margin-top: 24px;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #f0d060, #e6a020);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(240,208,96,0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .play-btn:active {
    transform: scale(0.93);
    box-shadow: 0 2px 10px rgba(240,208,96,0.3);
  }
  .play-btn svg {
    width: 40px;
    height: 40px;
    fill: #1a1a2e;
    margin-left: 4px;
  }
  .play-btn.playing svg.icon-play { display: none; }
  .play-btn:not(.playing) svg.icon-pause { display: none; }
  .progress-wrap {
    margin-top: 20px;
    width: 100%;
    position: relative;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    overflow: hidden;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f0d060, #e6a020);
    border-radius: 3px;
    transition: width 0.3s linear;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
  }
  .cross {
    margin-top: 24px;
    font-size: 14px;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>

<div class="card">
  <img class="cover" src="cover.png" alt="Backseat Saints">
  <div class="title">Backseat Saints</div>
  <div class="subtitle">The Empty Lunchbox</div>
  <div class="episode">Wednesday, April 22, 2026</div>

  <button class="play-btn" id="playBtn" onclick="togglePlay()">
    <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" onclick="seek(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">3:38</span>
    </div>
  </div>

  <div class="cross">+ God bless your drive today +</div>
</div>

<audio id="audio" src="Backseat_Saints_Apr22_v3.mp3" preload="auto"></audio>

<script>
  const audio = document.getElementById('audio');
  const btn = document.getElementById('playBtn');
  const fill = document.getElementById('progressFill');
  const cur = document.getElementById('currentTime');
  const tot = document.getElementById('totalTime');

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      btn.classList.add('playing');
    } else {
      audio.pause();
      btn.classList.remove('playing');
    }
  }

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      cur.textContent = fmt(audio.currentTime);
    }
  });

  audio.addEventListener('loadedmetadata', () => {
    tot.textContent = fmt(audio.duration);
  });

  audio.addEventListener('ended', () => {
    btn.classList.remove('playing');
    fill.style.width = '0%';
    cur.textContent = '0:00';
  });

  function seek(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }
</script>
</body>
</html>
